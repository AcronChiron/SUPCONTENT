                  $ref: '#/components/schemas/Track'

  # ═══════════════════════════════════════════════════════════════════════════
  # LIBRARY
  # ═══════════════════════════════════════════════════════════════════════════
  /library:
    get:
      tags: [Library]
      summary: Récupérer sa bibliothèque personnelle
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [TO_LISTEN, LISTENING, DONE, ABANDONED]
        - name: mediaType
          in: query
          schema:
            type: string
            enum: [ARTIST, ALBUM, TRACK]
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Bibliothèque paginée
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/LibraryItem'
    put:
      tags: [Library]
      summary: Ajouter ou mettre à jour une entrée dans sa bibliothèque
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibraryItemUpsertRequest'
      responses:
        '200':
          description: Entrée créée ou mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryItem'

  /library/stats:
    get:
      tags: [Library]
      summary: Statistiques de sa bibliothèque (tableau de bord)
      responses:
        '200':
          description: Statistiques agrégées
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryStats'

  /library/{itemId}:
    delete:
      tags: [Library]
      summary: Retirer une entrée de sa bibliothèque
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Entrée supprimée

  /users/{username}/library:
    get:
      tags: [Library]
      summary: Consulter la bibliothèque publique d'un utilisateur
      security: []
      parameters:
        - $ref: '#/components/parameters/UsernameParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [TO_LISTEN, LISTENING, DONE, ABANDONED]
        - name: mediaType
          in: query
          schema:
            type: string
            enum: [ARTIST, ALBUM, TRACK]
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Bibliothèque publique paginée
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/LibraryItem'

  /lists:
    get:
      tags: [Library]
      summary: Récupérer ses listes personnalisées
      responses:
        '200':
          description: Listes de l'utilisateur
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomList'
    post:
      tags: [Library]
      summary: Créer une liste personnalisée
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 100
                description:
                  type: string
                  maxLength: 500
                isPublic:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Liste créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomList'

  /lists/{listId}:
    get:
      tags: [Library]
      summary: Consulter une liste avec ses items
      security: []
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste avec items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomListWithItems'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Library]
      summary: Modifier une liste
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                isPublic: { type: boolean }
      responses:
        '200':
          description: Liste mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomList'
    delete:
      tags: [Library]
      summary: Supprimer une liste
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Liste supprimée

  /lists/{listId}/items:
    post:
      tags: [Library]
      summary: Ajouter un item à une liste
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [externalId, mediaType]
              properties:
                externalId: { type: string }
                mediaType:
                  type: string
                  enum: [ARTIST, ALBUM, TRACK]
      responses:
        '201':
          description: Item ajouté

  /lists/{listId}/items/{externalId}:
    delete:
      tags: [Library]
      summary: Retirer un item d'une liste
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: externalId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Item retiré

  # ═══════════════════════════════════════════════════════════════════════════
  # REVIEWS
  # ═══════════════════════════════════════════════════════════════════════════
  /reviews:
    post:
      tags: [Reviews]
      summary: Publier une critique
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
      responses:
        '201':
          description: Critique publiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'

  /reviews/{reviewId}:
    get:
      tags: [Reviews]
      summary: Consulter une critique
      security: []
      parameters:
        - $ref: '#/components/parameters/ReviewIdParam'
      responses:
        '200':
          description: Critique complète
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
    patch:
      tags: [Reviews]
      summary: Modifier sa critique
      parameters:
        - $ref: '#/components/parameters/ReviewIdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                content: { type: string, minLength: 10, maxLength: 5000 }
                rating: { type: integer, minimum: 1, maximum: 5 }
                containsSpoiler: { type: boolean }
      responses:
        '200':
          description: Critique mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
    delete:
      tags: [Reviews]
      summary: Supprimer sa critique
      parameters:
        - $ref: '#/components/parameters/ReviewIdParam'
      responses:
        '204':
          description: Critique supprimée

  /reviews/{reviewId}/like:
    post:
      tags: [Reviews]
      summary: Liker une critique
      parameters:
        - $ref: '#/components/parameters/ReviewIdParam'
      responses:
        '204':
          description: Like ajouté
    delete:
      tags: [Reviews]
      summary: Retirer son like
      parameters:
        - $ref: '#/components/parameters/ReviewIdParam'
      responses:
        '204':
          description: Like retiré

  /reviews/{reviewId}/comments:
    get:
      tags: [Reviews]
      summary: Commentaires d'une critique
      security: []
      parameters:
        - $ref: '#/components/parameters/ReviewIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Commentaires paginés
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Comment'
    post:
      tags: [Reviews]
      summary: Commenter une critique
      parameters:
        - $ref: '#/components/parameters/ReviewIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 1000
      responses:
        '201':
          description: Commentaire publié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'

  /reviews/{reviewId}/report:
    post:
      tags: [Reviews]
      summary: Signaler une critique
      parameters:
        - $ref: '#/components/parameters/ReviewIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  enum: [SPOILER, INAPPROPRIATE, SPAM, HARASSMENT]
                details:
                  type: string
                  maxLength: 500
      responses:
        '204':
          description: Signalement enregistré

  /music/{mediaType}/{externalId}/reviews:
    get:
      tags: [Reviews]
      summary: Critiques d'une oeuvre (album, artiste ou titre)
      security: []
      parameters:
        - name: mediaType
          in: path
          required: true
          schema:
            type: string
            enum: [artists, albums, tracks]
        - name: externalId
          in: path
          required: true
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [recent, popular, rating_asc, rating_desc]
            default: recent
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Critiques paginées
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Review'

  # ═══════════════════════════════════════════════════════════════════════════
  # FEED
  # ═══════════════════════════════════════════════════════════════════════════
  /feed:
    get:
      tags: [Feed]
      summary: Fil d'actualité personnalisé (abonnements)
      description: Agrégation chronologique des activités des utilisateurs suivis
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Activités paginées
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/FeedActivity'

  /feed/discover:
    get:
      tags: [Feed]
      summary: Découverte — contenu populaire & recommandations
      security: []
      description: |
        Feed de découverte basé sur les tags les plus populaires, 
        les critiques en vedette et les nouvelles sorties d'artistes suivis.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Contenu de découverte
          content:
            application/json:
              schema:
                type: object
                properties:
                  featuredReviews:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
                  trendingAlbums:
                    type: array
                    items:
                      $ref: '#/components/schemas/Album'
                  newReleases:
                    type: array
                    items:
                      $ref: '#/components/schemas/Album'
                  popularLists:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomList'

  # ═══════════════════════════════════════════════════════════════════════════
  # MESSAGES
  # ═══════════════════════════════════════════════════════════════════════════
  /messages/conversations:
    get:
      tags: [Messages]
      summary: Liste des conversations
      responses:
        '200':
          description: Conversations de l'utilisateur
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'

  /messages/conversations/{username}:
    get:
      tags: [Messages]
      summary: Messages d'une conversation
      description: Nécessite un suivi mutuel entre les deux utilisateurs
      parameters:
        - $ref: '#/components/parameters/UsernameParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Messages paginés
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Message'
        '403':
          description: Suivi mutuel requis
    post:
      tags: [Messages]
      summary: Envoyer un message
      description: |
        Endpoint REST pour l'envoi. 
        La réception en temps réel passe par WebSocket (Socket.io, event `message:new`).
      parameters:
        - $ref: '#/components/parameters/UsernameParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 2000
      responses:
        '201':
          description: Message envoyé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          description: Suivi mutuel requis

  # ═══════════════════════════════════════════════════════════════════════════
  # NOTIFICATIONS
  # ═══════════════════════════════════════════════════════════════════════════
  /notifications:
    get:
      tags: [Notifications]
      summary: Récupérer ses notifications
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Notifications paginées
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notification'

  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Marquer toutes les notifications comme lues
      responses:
        '204':
          description: Toutes les notifications marquées lues

  /notifications/{notificationId}/read:
    patch:
      tags: [Notifications]
      summary: Marquer une notification comme lue
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Notification marquée lue

  /notifications/preferences:
    get:
      tags: [Notifications]
      summary: Récupérer ses préférences de notifications
      responses:
        '200':
          description: Préférences actuelles
          content:
            application/json:
              schema:
                type: object
                properties:
                  newLike: { type: object, properties: { push: { type: boolean }, email: { type: boolean } } }
                  newComment: { type: object, properties: { push: { type: boolean }, email: { type: boolean } } }
                  newFollower: { type: object, properties: { push: { type: boolean }, email: { type: boolean } } }
                  newRelease: { type: object, properties: { push: { type: boolean }, email: { type: boolean } } }
    patch:
      tags: [Notifications]
      summary: Mettre à jour ses préférences de notifications
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                newLike: { type: object, properties: { push: { type: boolean }, email: { type: boolean } } }
                newComment: { type: object, properties: { push: { type: boolean }, email: { type: boolean } } }
                newFollower: { type: object, properties: { push: { type: boolean }, email: { type: boolean } } }
                newRelease: { type: object, properties: { push: { type: boolean }, email: { type: boolean } } }
      responses:
        '200':
          description: Préférences mises à jour

  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN
  # ═══════════════════════════════════════════════════════════════════════════
  /admin/reports:
    get:
      tags: [Admin]
      summary: Liste des signalements en attente
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, RESOLVED, DISMISSED]
            default: PENDING
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Signalements paginés
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/reports/{reportId}:
    patch:
      tags: [Admin]
      summary: Traiter un signalement
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [DISMISS, DELETE_REVIEW, BAN_USER]
                banDurationDays:
                  type: integer
                  description: Requis si action = BAN_USER. 0 = banni définitivement.
      responses:
        '204':
          description: Signalement traité
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/reviews/{reviewId}/feature:
    patch:
      tags: [Admin]
      summary: Mettre en avant / retirer la mise en avant d'une critique
      parameters:
        - $ref: '#/components/parameters/ReviewIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [featured]
              properties:
                featured:
                  type: boolean
      responses:
        '204':
          description: Statut mis à jour
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/users/{username}/ban:
    post:
      tags: [Admin]
      summary: Bannir un utilisateur
      parameters:
        - $ref: '#/components/parameters/UsernameParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                durationDays:
                  type: integer
                  description: 0 = banni définitivement
      responses:
        '204':
          description: Utilisateur banni
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/users/{username}/unban:
    post:
      tags: [Admin]
      summary: Lever un bannissement
      parameters:
        - $ref: '#/components/parameters/UsernameParam'
      responses:
        '204':
          description: Bannissement levé
        '403':
          $ref: '#/components/responses/Forbidden'

  # ═══════════════════════════════════════════════════════════════════════════
  # EXPORT RGPD
  # ═══════════════════════════════════════════════════════════════════════════
  /export/my-data:
    get:
      tags: [Export]
      summary: Exporter ses données personnelles (conformité RGPD)
      description: |
        Génère une archive contenant toutes les données personnelles :
        - Profil utilisateur
        - Bibliothèque complète
        - Toutes les critiques rédigées
        - Historique des messages
        - Listes personnalisées
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        '200':
          description: Fichier d'export
          content:
            application/json:
              schema:
                type: object
            text/csv:
              schema:
                type: string
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="supcontent-export-2025.json"'
        '429':
          description: Export déjà demandé récemment (cooldown 24h)
